# Reusable vars
x-var:
  - &POSTGRES_USER postgres
  - &POSTGRES_PASSWORD default
  - &POSTGRES_DATABASE postgres
  - &node-image node:22

# Reusable envars for postgres
x-postgres-vars: &postgres-vars
  POSTGRES_HOST: database
  POSTGRES_USER: *POSTGRES_USER
  POSTGRES_PASSWORD: *POSTGRES_PASSWORD
  POSTGRES_DATABASE: *POSTGRES_DATABASE

services:
  database:
    image: postgis/postgis:17-3.4 # if using crunchy , make sure to align with crunchy version, currently it is at 16 and postgis 3.3
    container_name: database
    environment:
      <<: *postgres-vars
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", *POSTGRES_USER ]
    ports: [ "5432:5432" ]

  schemaspy:
    image: schemaspy/schemaspy:7.0.2
    profiles: [ "schemaspy" ]
    container_name: schemaspy
    command: -t pgsql11 -db postgres -host database -port 5432 -u postgres -p default -schemas users
    depends_on:
      migrations:
        condition: service_completed_successfully
    volumes: [ "./output:/output" ]

  backend:
    container_name: backend
    depends_on:
      migrations:
        condition: service_started
    entrypoint: sh -c "npm i && npm run start:dev"
    environment:
      <<: *postgres-vars
      NODE_ENV: development
    image: *node-image
    ports: [ "3001:3000" ]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/api" ]
    working_dir: "/app"
    volumes: [ "./backend:/app", "/app/node_modules" ]
